{% extends "evaluations/base.html" %}
{% block title %}Dashboard Login{% endblock %}
{% block content %}
<div style="max-width:420px; margin:4rem auto;">
  <div class="card" style="border-top:4px solid var(--primary);">
    <div style="text-align:center; margin-bottom:1.5rem;">
      <div style="font-size:3rem;"></div>
      <h2 style="font-size:1.3rem; margin-top:.5rem;">Dashboard Access</h2>
      <p style="font-size:.9rem; color:var(--gray-600); margin-top:.3rem;">Enter the tutor password to access the dashboard.</p>
    </div>
    {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
    <form method="post">
      {% csrf_token %}
      <div style="margin-bottom:1.2rem;">
        <label style="display:block; font-weight:500; margin-bottom:6px; font-size:.9rem;">Password</label>
        <input type="password" name="password" autofocus
               style="width:100%; padding:.7rem 1rem; border:2px solid var(--gray-200); border-radius:8px; font-size:1rem; outline:none;"
               onfocus="this.style.borderColor='var(--primary)'" onblur="this.style.borderColor='var(--gray-200)'"
               placeholder="Enter tutor password...">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:.75rem;">
         Access Dashboard
      </button>
    </form>
    <div style="text-align:center; margin-top:1rem;">
      <a href="/evaluate/" style="font-size:.85rem; color:var(--gray-600); text-decoration:none;">Go to Evaluation Forms</a>
    </div>
  </div>
</div>
{% endblock %}
