<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Presentation Evaluation System{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary:#4f46e5; --primary-light:#eef2ff;
      --student:#3b82f6; --tutor:#10b981; --invited:#8b5cf6;
      --success:#22c55e; --warning:#f59e0b; --danger:#ef4444;
      --gray-50:#f9fafb; --gray-100:#f3f4f6; --gray-200:#e5e7eb;
      --gray-600:#4b5563; --gray-800:#1f2937; --gray-900:#111827;
      --radius:10px; --shadow:0 1px 3px rgba(0,0,0,.1);
    }
    body { font-family:'Inter',system-ui,sans-serif; background:var(--gray-50); color:var(--gray-800); }
    nav { background:white; border-bottom:1px solid var(--gray-200); padding:0 2rem; display:flex; align-items:center; gap:1.5rem; height:60px; box-shadow:var(--shadow); flex-wrap:wrap; }
    nav .brand { font-weight:700; font-size:1.1rem; color:var(--primary); text-decoration:none; }
    nav a { color:var(--gray-600); text-decoration:none; font-size:.9rem; padding:.4rem .8rem; border-radius:6px; transition:all .2s; }
    nav a:hover { background:var(--primary-light); color:var(--primary); }
    nav .nav-export { margin-left:auto; background:#dcfce7; color:#166534; border-radius:6px; padding:.4rem .9rem; font-size:.85rem; font-weight:600; text-decoration:none; }
    nav .nav-export:hover { background:#bbf7d0; }
    .container { max-width:1200px; margin:0 auto; padding:2rem; }
    .page-title { font-size:1.6rem; font-weight:700; margin-bottom:.3rem; }
    .page-sub { color:var(--gray-600); margin-bottom:2rem; font-size:.9rem; }
    .card { background:white; border-radius:var(--radius); border:1px solid var(--gray-200); padding:1.5rem; box-shadow:var(--shadow); }
    .card-title { font-weight:600; font-size:1rem; margin-bottom:1rem; }
    .grid { display:grid; gap:1.5rem; }
    .grid-2 { grid-template-columns:repeat(2,1fr); }
    .grid-3 { grid-template-columns:repeat(3,1fr); }
    .grid-4 { grid-template-columns:repeat(4,1fr); }
    .stat-card { background:white; border-radius:var(--radius); border:1px solid var(--gray-200); padding:1.2rem; text-align:center; }
    .stat-val { font-size:2rem; font-weight:700; }
    .stat-label { font-size:.8rem; color:var(--gray-600); margin-top:.2rem; }
    .badge { display:inline-block; padding:2px 10px; border-radius:999px; font-size:.75rem; font-weight:600; }
    .badge-student { background:#dbeafe; color:var(--student); }
    .badge-tutor { background:#d1fae5; color:var(--tutor); }
    .badge-invited { background:#ede9fe; color:var(--invited); }
    .progress-bar { height:8px; background:var(--gray-200); border-radius:999px; overflow:hidden; margin-top:4px; }
    .progress-fill { height:100%; border-radius:999px; transition:width .5s ease; }
    table { width:100%; border-collapse:collapse; font-size:.9rem; }
    th { text-align:left; padding:.7rem 1rem; background:var(--gray-50); border-bottom:2px solid var(--gray-200); font-weight:600; font-size:.78rem; text-transform:uppercase; letter-spacing:.05em; color:var(--gray-600); }
    td { padding:.75rem 1rem; border-bottom:1px solid var(--gray-100); }
    tr:last-child td { border-bottom:none; }
    tr:hover td { background:var(--gray-50); }
    .btn { display:inline-flex; align-items:center; gap:.4rem; padding:.5rem 1.2rem; border-radius:8px; font-size:.9rem; font-weight:500; cursor:pointer; text-decoration:none; border:none; transition:all .2s; }
    .btn-primary { background:var(--primary); color:white; }
    .btn-primary:hover { background:#4338ca; }
    .btn-secondary { background:var(--gray-100); color:var(--gray-800); }
    .btn-secondary:hover { background:var(--gray-200); }
    .btn-success { background:#16a34a; color:white; }
    .btn-success:hover { background:#15803d; }
    .score-chip { display:inline-block; padding:3px 10px; border-radius:6px; font-weight:600; font-size:.85rem; }
    .score-high { background:#dcfce7; color:#16a34a; }
    .score-mid { background:#fef9c3; color:#ca8a04; }
    .score-low { background:#fee2e2; color:#dc2626; }
    .rank-badge { width:32px; height:32px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; font-weight:700; font-size:.9rem; }
    .rank-1 { background:#fef9c3; color:#b45309; }
    .rank-2 { background:#f1f5f9; color:#475569; }
    .rank-3 { background:#fef3c7; color:#92400e; }
    .rank-other { background:var(--gray-100); color:var(--gray-600); }
    .messages { margin-bottom:1rem; }
    .alert { padding:.8rem 1rem; border-radius:8px; margin-bottom:.5rem; font-size:.9rem; }
    .alert-success { background:#dcfce7; color:#166534; border:1px solid #bbf7d0; }
    .alert-error { background:#fee2e2; color:#991b1b; border:1px solid #fecaca; }
    .alert-warning { background:#fef9c3; color:#854d0e; border:1px solid #fde68a; }
    @media (max-width:768px) { .grid-2,.grid-3,.grid-4 { grid-template-columns:1fr; } }
  </style>
</head>
<body>
<nav>
  <a href="/" class="brand"> EvalSystem</a>
  <a href="/evaluate/"> Evaluate</a>
  <a href="/admin/" target="_blank"> Admin</a>
  <a href="/export/excel/" class="nav-export"> Export Excel</a>
</nav>
<div class="container">
  {% if messages %}
  <div class="messages">
    {% for message in messages %}
    <div class="alert alert-{{ message.tags }}">{{ message }}</div>
    {% endfor %}
  </div>
  {% endif %}
  {% block content %}{% endblock %}
</div>
</body>
</html>
